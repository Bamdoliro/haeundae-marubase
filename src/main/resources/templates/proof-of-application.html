<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{classpath:/static/css/common.css}"/>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        * {
            font-family: SUIT, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        table {
            border: none;
            border-collapse: collapse;
            font-size: 12px;
            text-align: center;
            line-height: normal;
        }

        caption {
            padding-bottom: 6px;
        }

        tr {
            vertical-align: middle;
        }

        td {
            padding: 8px 8px;
            text-align: left;
            background-color: white;
        }

        th {
            background-color: #EFF3F9;
            font-weight: 500;
            padding: 8px 0;
            letter-spacing: 6px;
            text-indent: 6px;
        }

        .ba {
            border: #000000 1px solid;
        }

        .center {
            text-align: center;
        }

        .big {
            font-weight: 500;
            font-size: 20px;
        }

        .letter-spacing-10 {
            letter-spacing: 10px;
            text-indent: 10px;
        }

        .letter-spacing-25 {
            letter-spacing: 25px;
            text-indent: 25px;
        }

        .admission-ticket-container {
            width: 55%;
            float: left;
            padding: 50px 30px;
        }

        .admission-ticket {
            width: 100%;
        }

        .information-container {
            height: 297mm;
            width: 45%;
            float: right;
            padding: 50px 30px;
            background-color: #EFF3F9;
        }

        .information {
            width: 100%;
            margin-top: 12px;
        }

        .left {
            text-align: left;
        }

        .red {
            color: #F44336;
            font-size: 12px;
        }

        .more {
            padding-top: 4px;
            font-size: 12px;
        }

        .title {
            font-weight: 600;
            font-size: 24px;
            padding-bottom: 12px;
        }
    </style>
    <title>수험표</title>
</head>
<body>
<main class="container">
    <section class="admission-ticket-container">
        <table class="admission-ticket">
            <tr class="ba">
                <td colspan="3" class="ba center" style="height: 48px;">
                    <p th:text='${year+"학년도"}'></p>
                    <p>해운대고등학교 입학전형</p>
                    <p class="big letter-spacing-10">접수증</p>
                </td>
            </tr>
            <tr>
                <td class="ba center" style="width: 33%" rowspan="6">
                    <img
                            th:src="${identificationPictureUri}"
                            alt="증명사진"/>
                </td>
                <th scope="row" class="ba">접수번호</th>
                <td class="ba" style="border: #000000 1px solid" th:text="${form.id}"></td>
            </tr>
            <tr>
                <th scope="row" class="ba">전형구분</th>
                <td class="ba" th:text="${form.type.getMainCategory().description}"></td>
            </tr>
            <tr>
                <th scope="row" class="ba">대상구분</th>
                <td class="ba" th:unless="${form.type.isNationalVeteransEducation()}" th:text="${form.type.getDescription()}"></td>
                <td class="ba" th:if="${form.type.isNationalVeteransEducation()}">국가보훈대상자</td>
            </tr>
            <tr>
                <th scope="row" class="ba">생년월일</th>
                <td class="ba" th:text="${#temporals.format(form.applicant.birthday, 'yyyy년 MM월 dd일')}"></td>
            </tr>
            <tr>
                <th scope="row" class="ba letter-spacing-25">성명</th>
                <td class="ba" th:text="${form.applicant.name}"></td>
            </tr>
            <tr>
                <th scope="row" class="ba">출신학교</th>
                <td class="ba" th:text="${form.education.school.name}"></td>
            </tr>
            <tr>
                <td colspan="3" class="ba center big">
                    <p>해운대고등학교장</p>
                </td>
            </tr>
        </table>
    </section>
    <section class="information-container">
        <p class="title">전형일정 안내</p>
        <table class="information ba">
            <caption class="big left">1. 일정</caption>
            <tr>
                <th scope="colgroup" class="ba" style="width: 30%">구분</th>
                <th scope="colgroup" class="ba" style="width: 40%">기간</th>
                <th scope="colgroup" class="ba" style="width: 30%">장소</th>
            </tr>
            <tr>
                <td class="ba" style="word-break: keep-all;">원서 및 서류 제출</td>
                <td class="ba"  th:text="${start + '~' + end}" style="word-break: keep-all;"> </td>
                <td class="ba" style="word-break: keep-all;">-본교 접수처</td>
            </tr>
            <tr>
                <td class="ba" style="word-break: keep-all;">면접대상자 발표</td>
                <td class="ba" th:text="${announcement_of_first_pass}"></td>
                <td class="ba">-본교홈페이지<br/>-해당학교 공문 발송</td>
            </tr>
        </table>
        <div class="red more">
            <p>※ 작성한 원서 및 전형별 제출서류를 본교에 제출하지 않을 경우 원서는 접수되지않음.
                <br/>※ 전형료 10,000원 (1단계: 2,500원, 2단계: 7,500원)
                <br/>-전형료는 입학서류 제출 시 본교 접수처에 현금납부
                <br/>-1단계 불합격자는 사정 이후 2단계 전형료 환불</p>
        </div>
    </section>
</main>
</body>
</html>
